<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Inner hex: core visual -->
  <polygon points="100,52 148,78 148,124 100,150 52,124 52,78"
    stroke="#00E5FF" stroke-width="6"
    fill="#00E5FF" fill-opacity="0.06"/>

  <!-- Central core -->
  <circle cx="100" cy="100" r="18" fill="#050810"/>
  <circle cx="100" cy="100" r="18" stroke="#00E5FF" stroke-width="4" opacity="0.7"/>
  <circle cx="100" cy="100" r="10" fill="#00E5FF" filter="url(#glow)"/>

  <!-- Node hints (reduced) -->
  <circle cx="100" cy="52"  r="4" fill="#00E5FF"/>
  <circle cx="148" cy="78"  r="4" fill="#00E5FF"/>
  <circle cx="148" cy="124" r="4" fill="#00E5FF"/>
  <circle cx="100" cy="150" r="4" fill="#00E5FF"/>
  <circle cx="52"  cy="124" r="4" fill="#00E5FF"/>
  <circle cx="52"  cy="78"  r="4" fill="#00E5FF"/>
</svg>
