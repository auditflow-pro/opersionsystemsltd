<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operion Systems Ltd</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="logo.svg" alt="Operion Systems Logo" class="logo">
    <nav>
      <button id="openDemoForm">Request Demo</button>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Deterministic AI Orchestrated Operations</h1>
      <p>Operion: Streamline enquiries, automate workflows, and stay in control.</p>
    </section>

    <section id="demoSection" class="demo-section hidden">
      <h2>Request a Demo</h2>
      <form id="requestDemoForm">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="details" placeholder="Brief Description" required></textarea>
        <button type="submit">Submit</button>
      </form>
      <p id="formStatus"></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
