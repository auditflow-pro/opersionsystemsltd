<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operion Demo</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="section section-demo">
    <div class="container">
      <span class="section-label">Demo</span>
      <h2 class="display-2">Operion Pipeline Demo</h2>
      <p class="text-dim">Interact with the deterministic AI orchestration demo below.</p>

      <!-- Demo interaction placeholder -->
      <div class="card terminal">
        <div class="terminal-bar">
          <span class="terminal-dot terminal-dot-red"></span>
          <span class="terminal-dot terminal-dot-amber"></span>
          <span class="terminal-dot terminal-dot-green"></span>
          <span class="terminal-title">Operion Demo</span>
        </div>
        <div class="t-output">
          <span class="t-prompt">> </span>
          <span class="t-output">Pipeline ready. Send inputs to begin processing...</span>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
